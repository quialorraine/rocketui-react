name: Publish

# Publishes @rocketui-react/core to npm when a GitHub Release is published.
# Bump the version first (npm version patch|minor|major), push the tag, then
# create a Release for that tag.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # prepublishOnly builds dist/ and regenerates the manifest.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
